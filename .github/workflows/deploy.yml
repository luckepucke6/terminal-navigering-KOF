# This workflow runs every time you push to main.
# It builds the app with Vite and publishes the result to GitHub Pages.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# These permissions let the workflow write to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Upload the dist folder as a GitHub Pages artifact.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # Deploy the uploaded artifact to GitHub Pages.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
